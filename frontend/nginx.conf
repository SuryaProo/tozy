server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # React Router — all paths go to index.html
  location / {
    try_files $uri /index.html;
  }

  # Backend API proxy
  location /api {
    proxy_pass http://backend-service:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
